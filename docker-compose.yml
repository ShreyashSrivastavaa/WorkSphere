version: '3.8'

services:
  db:
    image: mongo:4.4
    container_name: employee-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employee-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASEURL=mongodb://db:27017/emp
      - JWTKEY=xyz
      - PORT=4000
    depends_on:
      - db
    restart: always

volumes:
  mongo-data:
